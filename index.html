<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Qwill AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  .splash {
    position: relative;
    width: 100vw;
    height: 100vh;
    background-color: #91928d;
    background-image: url('qwill_logo.jpg');
    background-size: cover;
    background-position: center 30%;
    background-repeat: no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 10vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .overlay-panel {
    background: rgba(20, 20, 20, 0.55);
    backdrop-filter: blur(6px);
    border-radius: 20px;
    padding: 1.2rem 2rem 1.6rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .qwill-title {
    color: #ffffff;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 0.5rem;
  }
  .by-text {
    color: rgba(255,255,255,0.8);
    font-size: 0.9rem;
    margin-bottom: 0.6rem;
  }
  .quaarrd-logo {
    width: 70px;
    height: auto;
    border-radius: 10px;
  }
</style>
</head>
<body>
  <div class="splash">
    <div class="overlay-panel">
      <div class="qwill-title">Qwill AI</div>
      <div class="by-text">by</div>
      <img class="quaarrd-logo" src="Quaarrd%20logo.jpg" alt="Quaarrd">
    </div>
  </div>
</body>
</html>
